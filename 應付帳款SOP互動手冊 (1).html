<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>應付帳款作業 SOP 互動手冊</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f4;
  --color-background-tertiary:#efede8;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --color-background-primary:#1e1e1c;
  --color-background-secondary:#2a2a28;
  --color-background-tertiary:#141412;
  --color-text-primary:#e8e6e0;
  --color-text-secondary:#9c9a92;
  --color-border-tertiary:rgba(255,255,255,0.1);
  --color-border-secondary:rgba(255,255,255,0.18);
}}
body{background:var(--color-background-tertiary);font-family:var(--font-sans);min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.container{width:100%;max-width:820px;background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:2rem}
.app{font-family:var(--font-sans);max-width:760px}
.view{display:none}.view.active{display:block}
.top-nav{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.back-btn{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:12px;font-weight:500;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--color-background-secondary)}
.breadcrumb{font-size:12px;color:var(--color-text-secondary)}
.breadcrumb span{color:var(--color-text-primary)}
.overview-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.overview-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.5}
.flow-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.flow-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.flow-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.fc-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:var(--border-radius-md);margin-bottom:8px;display:inline-block}
.fc-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.fc-def{font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.fc-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.fc-tag{font-size:10px;padding:1px 6px;border-radius:var(--border-radius-md)}
.bc-p{background:#E6F1FB;color:#0C447C}.bc-f{background:#E1F5EE;color:#085041}.bc-o{background:#FAEEDA;color:#633806}
.ft-p{background:#E6F1FB;color:#0C447C}.ft-f{background:#E1F5EE;color:#085041}
.module-ref-btn{width:100%;padding:10px 14px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:13px;font-weight:500;cursor:pointer;color:var(--color-text-primary);text-align:left;display:flex;align-items:center;justify-content:space-between}
.module-ref-btn:hover{background:var(--color-background-secondary)}
.flow-view-header{margin-bottom:1rem}
.fv-code{font-size:11px;font-weight:500;margin-bottom:5px}
.fv-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.fv-def{font-size:12px;color:var(--color-text-secondary);line-height:1.55}
.dept-tabs{display:flex;gap:6px;margin-bottom:1rem}
.dt{padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:12px;font-weight:500;cursor:pointer;color:var(--color-text-secondary)}
.dt.ap{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.dt.af{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.pbar{height:3px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:1.25rem;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width 0.3s}
.bp{background:#378ADD}.bf{background:#1D9E75}
.step-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.snum{font-size:11px;font-weight:500;margin-bottom:5px}
.snp{color:#378ADD}.snf{color:#1D9E75}
.stitle{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.sdesc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:8px}
.principle-box{background:var(--color-background-secondary);border-left:3px solid #378ADD;padding:10px 12px;margin:10px 0;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.error-box{background:#FBEAF0;border:0.5px solid #F4C0D1;border-radius:var(--border-radius-md);padding:10px 12px;margin:10px 0;font-size:12px;color:#72243E;line-height:1.6}
.note-box{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--border-radius-md);padding:10px 12px;margin:10px 0;font-size:12px;color:#633806;line-height:1.6}
.info-box{background:#E6F1FB;border:0.5px solid #85B7EB;border-radius:var(--border-radius-md);padding:10px 12px;margin:10px 0;font-size:12px;color:#0C447C;line-height:1.6}
.context-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin:10px 0;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.subs{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.sub{padding:8px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);font-size:12px;color:var(--color-text-primary);line-height:1.55}
.sub b{display:block;font-size:11px;font-weight:500;margin-bottom:2px;color:#185FA5}
.tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 7px;border-radius:var(--border-radius-md)}
.ts2{background:#E6F1FB;color:#0C447C}.td2{background:#FAEEDA;color:#633806}.ta2{background:#EAF3DE;color:#27500A}.tc2{background:#FBEAF0;color:#72243E}
.content-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px}
.ctab{padding:4px 12px;border-radius:var(--border-radius-md);border:none;background:transparent;font-size:12px;cursor:pointer;color:var(--color-text-secondary)}
.ctab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.ctab-content{display:none}.ctab-content.active{display:block}
.nav-row{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:1.25rem}
.nb2{padding:7px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:13px;font-weight:500;cursor:pointer;color:var(--color-text-primary)}
.nb2:disabled{opacity:0.35;cursor:not-allowed}
.nb2.pp{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.nb2.pf{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.sc2{font-size:12px;color:var(--color-text-secondary)}
.done-wrap{text-align:center;padding:2rem 1rem}
.done-wrap h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.done-wrap p{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem}
.rb{padding:7px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:12px;cursor:pointer;color:var(--color-text-primary)}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mod-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px}
.mod-code-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--border-radius-md);margin-bottom:6px;display:inline-block}
.mod-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.mod-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.55;margin-bottom:6px}
.mod-flows{display:flex;flex-wrap:wrap;gap:3px}
.mod-flow-tag{font-size:10px;padding:1px 5px;border-radius:var(--border-radius-md)}
.sec-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin:1rem 0 8px;letter-spacing:0.04em;text-transform:uppercase}
</style>
</head>
<body>
<div class="container">
<div class="app">

<div id="view-overview" class="view active">
  <div class="overview-title">應付帳款作業 SOP 互動手冊</div>
  <div class="overview-sub">財務端新進人員適用　·　點選流程卡片進入步驟詳細說明</div>
  <div class="sec-label">作業流程</div>
  <div class="flow-grid" id="flow-grid"></div>
  <button class="module-ref-btn" onclick="showModuleRef()">
    <span><i class="ti ti-database" style="margin-right:6px;font-size:14px"></i>系統模組快速查詢</span>
    <i class="ti ti-chevron-right" style="font-size:14px;color:var(--color-text-secondary)"></i>
  </button>
</div>

<div id="view-flow" class="view">
  <div class="top-nav">
    <button class="back-btn" onclick="showOverview()"><i class="ti ti-arrow-left" style="font-size:13px"></i> 返回總覽</button>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="flow-view-header">
    <div class="fv-code" id="fv-code"></div>
    <div class="fv-title" id="fv-title"></div>
    <div class="fv-def" id="fv-def"></div>
  </div>
  <div class="dept-tabs" id="dept-tabs"></div>
  <div class="pbar"><div class="pfill bp" id="pfill" style="width:20%"></div></div>
  <div id="step-content"></div>
  <div class="nav-row">
    <button class="nb2" id="btn-prev" onclick="navStep(-1)"><i class="ti ti-arrow-left"></i> 上一步</button>
    <span class="sc2" id="scount"></span>
    <button class="nb2 pp" id="btn-next" onclick="navStep(1)">下一步 <i class="ti ti-arrow-right"></i></button>
  </div>
</div>

<div id="view-modules" class="view">
  <div class="top-nav">
    <button class="back-btn" onclick="showOverview()"><i class="ti ti-arrow-left" style="font-size:13px"></i> 返回總覽</button>
    <div class="breadcrumb">系統模組快速查詢</div>
  </div>
  <div id="module-content"></div>
</div>

</div>
</div>
<script>
const flows=[
  {id:'AAP007A',label:'AAP007-A',title:'採購單立預付請款流程',def:'採購預付申請立帳並產生預付待抵款，入庫時沖銷。',depts:['p','f'],
   steps:[
    {dept:'p',num:'採購端 — 步驟 1',title:'確認採購單訂金類型',desc:'確認採購單載有「訂金」，依供應商開立發票情況選擇帳期維護類型。',principle:'帳期維護 1（不開發票）：分錄不含進項稅額，單純記預付帳款。帳期維護 2（應開發票）：分錄需加入進項稅額，此設定直接影響後續財務端的傳票分錄，一開始就必須確認清楚。',error:'確認類型錯誤將導致後續傳票科目錯誤，財務端付款後才發現要沖銷重來，程序繁複。',subs:[{l:'帳期維護 1：不開立發票',d:'供應商不開立預付發票，無進項稅額。'},{l:'帳期維護 2：應開立發票',d:'供應商必須開立預付發票，可認列進項稅額。'}],tags:[{t:'採購單',c:'td2'},{t:'訂金確認',c:'ta2'}],note:'可至 aapq160 查找尚未申請的預付採購資料。',nt:'n'},
    {dept:'p',num:'採購端 — 步驟 2',title:'執行 aapp134 拋轉應付單',desc:'確認採購單已同意及確認後，執行 aapp134，自動將訂金資訊轉換成 aapt310 應付單。',principle:'aapp134 是採購模組與財務模組之間的橋梁程式。採購單記的是「買什麼、多少錢」，財務模組需要「付誰、科目是什麼」，兩種語言不同，需要拋轉轉換，才能讓財務端看得懂並進行後續作業。',error:null,subs:null,tags:[{t:'aapp134',c:'ts2'},{t:'拋轉應付單',c:'ta2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 3',title:'檢核 aapt310 並印出紙本',desc:'檢視系統生成的 aapt310 單號，確認金額、廠商、科目等資訊正確無誤後，印出紙本送主管審核。',principle:'系統自動帶入資料時不會自己發現錯誤，需要人工把關。aapt310 是後續付款的依據，此時的錯誤若未發現，付款後要更正非常麻煩，因此這一步的核對不可草率。',error:'常見錯誤：不仔細核對就送審。主管簽完、財務付款後才發現金額或科目有誤，需沖銷重來。',subs:null,tags:[{t:'aapt310',c:'ts2'},{t:'紙本列印',c:'td2'},{t:'資訊核對',c:'tc2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 4',title:'主管簽核並移交會計',desc:'主管於紙本簽核後，連同採購單影本及廠商憑據（如收據、訂金通知），一併交付會計部門檢核及請款。',principle:'職能分工原則：採購端核對業務面（金額、廠商），財務端核對帳務面（科目、分錄）。同一人不得同時執行兩項，這是稽核的基本要求，也是避免舞弊的機制。',error:null,subs:null,tags:[{t:'主管簽核',c:'tc2'},{t:'移交會計',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 5',title:'會計單位檢核並維護科目',desc:'會計單位獨立核對預付請款內容及憑證資訊，確認或修正會計科目後，送交主管覆審。',principle:'為什麼要再核對一次？採購端核對業務面，財務端核對帳務面。雙重核對是內部控制要求。科目維護是財務端最重要的工作，系統預設值不一定符合實際情況，例如國內外廠商可能用不同預付科目，原料採購與備品採購也可能分開科目。',error:'常見錯誤：直接沿用系統預設科目而不確認。不同廠商類型、採購類別可能有不同科目，務必人工逐一確認，不要依賴預設值。',subs:null,tags:[{t:'憑證核對',c:'tc2'},{t:'科目維護',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 6',title:'主管覆審並確認 aapt310',desc:'財務主管覆審後，在系統上執行「確認」動作，aapt310 狀態鎖定，系統自動產生預付待抵單。',principle:'系統「確認」後觸發兩件事：① aapt310 鎖定不可修改 ② 自動產生待抵單。待抵單是系統的「記憶」：記錄這筆錢已付出，等入庫時拿來沖銷。有了待抵單，後續入庫的流程才知道「這批貨已付過訂金」，不會重複付款。',error:null,subs:null,tags:[{t:'aapt310',c:'ts2'},{t:'主管確認',c:'tc2'}],note:'確認後系統自動產生待抵單，是後續入庫沖銷的依據，務必確認後才能產生。',nt:'i'},
    {dept:'f',num:'財務端 — 步驟 7',title:'檢核待抵單資訊',desc:'核對系統自動產生的待抵單：金額、供應商、幣別須與 aapt310 完全一致，狀態應為「未沖」。',principle:'待抵單記錄了這筆預付款的完整資訊，入庫時系統會依此進行自動沖銷。若待抵單資料有誤，入庫時系統無法正確對應，可能造成沖銷失敗或重複付款。現在多花一分鐘核對，勝過事後花一小時更正。',error:'實務常見：① 待抵金額只帶未稅金額，稅額漏掉 ② 幣別帶錯，台幣採購跑成美金 ③ 待抵單對應到錯誤廠商。不要以為系統自動產生就一定正確，務必逐項確認。',subs:null,tags:[{t:'待抵單',c:'ts2'},{t:'資訊核對',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 8',title:'產生傳票並執行付款流程',desc:'待抵單確認無誤後，產生正式傳票，送主管審核，通過後執行實際付款（銀行電匯或開立票據）。',principle:'帳期維護 1 傳票：借 預付帳款 / 貸 銀行存款。帳期維護 2 傳票：借 預付帳款 + 進項稅額 / 貸 銀行存款（含稅）。付款後預付帳款仍掛帳等待沖銷，等貨到入庫後，分錄為：借 存貨 / 貸 預付帳款，完成整個預付循環。',error:null,subs:null,tags:[{t:'傳票產生',c:'ta2'},{t:'付款流程',c:'ta2'}],note:null}
   ]},
  {id:'AAP007B',label:'AAP007-B',title:'採購月結整帳及應付立帳',def:'進貨入庫後月結整帳，錄入供應商發票，成立應付帳款，沖銷預付或暫估。',depts:['p','f'],
   steps:[
    {dept:'p',num:'採購端 — 步驟 1',title:'確認入庫單狀態為「已過帳」',desc:'確認 apmt530 入庫單狀態為「已過帳」，方可進行後續月結整帳作業。',principle:'「已過帳」代表兩件事同時成立：① 倉庫確認貨物實際到貨 ② 存貨數量已正式更新到系統。若入庫單未過帳就進行應付立帳，會造成「存貨未入帳但應付帳款已出現」，資產負債表中存貨低估、負債虛增，失真。',error:null,subs:null,tags:[{t:'apmt530',c:'ts2'},{t:'入庫確認',c:'tc2'}],note:'可用 aapq130 查詢「未立暫估及未立帳」資訊，月底結帳前須完成所有單據，否則當月財務報表數字不完整。',nt:'n'},
    {dept:'p',num:'採購端 — 步驟 2',title:'執行 aapp320 生成對帳單 aapt110',desc:'執行 aapp320 生成 aapt110 對帳單，匯總條件選「1：交易對象」，對帳方式選「2：進貨發票立帳」。',principle:'匯總條件「1：交易對象」讓同一廠商本月所有入庫合併成一張對帳單，廠商對帳較簡潔，也減少單據數量。對帳方式「2：進貨發票立帳」代表要登錄廠商發票，以發票金額為準正式成立應付帳款。',error:null,subs:[{l:'匯總條件',d:'選「1：交易對象」，同一廠商本月所有入庫合併一張對帳單。'},{l:'對帳方式',d:'選「2：進貨發票立帳」，並依需求設定 QBE 條件篩選資料範圍。'}],tags:[{t:'aapp320',c:'ts2'},{t:'aapt110',c:'ts2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 3',title:'查看 aapt110 並核對發票金額',desc:'採購人員拿著廠商實體發票，逐筆核對 aapt110 系統金額是否與發票一致，確認無誤後登錄發票明細。',principle:'aapt110 的金額來自入庫單（系統自動帶入），廠商發票是廠商自己開的，兩邊來源不同，可能有差異。差異原因包括：廠商開錯金額、單價與採購單不符、實際入庫數量與廠商認定出貨數量有出入。務必以發票為準進行比對。',error:'發現金額不一致時，不能直接沿用系統金額，必須與廠商對帳確認哪邊有誤，釐清後才能繼續下一步。',subs:[{l:'退倉單併入',d:'如需將退倉單（退回給廠商的貨）併入同一對帳單，手動在單身挑選倉退單，金額會自動扣除。'},{l:'多張發票處理',d:'廠商分批出貨時可能有多張發票，用「整單操作：發票與明細入庫項指定對應」進行一對一項次入庫，確保每張發票對應到正確的入庫項次。'}],tags:[{t:'aapt110',c:'ts2'},{t:'發票核對',c:'tc2'},{t:'登錄明細',c:'ta2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 4',title:'挑選待抵單並送主管審核',desc:'如採購單已有預付待抵（AAP007-A 產生），在單身來源作業挑選「27：其他待抵單」及對應待抵單單號，完成後送主管審核。',principle:'挑選待抵單的目的：讓系統知道「這批貨的貨款裡有一部分已先付過訂金」，成立應付帳款時才會正確扣除，不重複請款。未挑選的話，財務端付款時會多付出已付過的訂金金額。',error:null,subs:null,tags:[{t:'待抵單挑選',c:'ta2'},{t:'送審',c:'tc2'}],note:'若無預付待抵資訊，此步驟可略過，直接送主管審核。',nt:'n'},
    {dept:'p',num:'採購端 — 步驟 5',title:'主管審核並確認單據',desc:'主管確認入庫數量與發票一致、金額正確、退倉及待抵單均已正確處理後，在系統執行「確認」，採購端流程完成，移交財務端。',principle:null,error:null,subs:null,tags:[{t:'主管確認',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 6',title:'執行 aapp132 拋轉至 aapt300',desc:'執行 aapp132，將採購端確認完成的 aapt110 對帳單拋轉到 aapt300 應付帳款單。採購經手人同步將實體發票及對帳資訊送交會計。',principle:'財務端需要實體發票進行獨立核對，不能只看系統資料。電子系統的資料是採購人員登錄的，財務端必須看原始憑證（實體發票）確認，這是稽核的基本要求，也是雙重核對的精神。',error:null,subs:null,tags:[{t:'aapp132',c:'ts2'},{t:'aapt300',c:'ts2'},{t:'拋轉請款單',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 7',title:'查看 aapt300 並確認立帳及沖銷',desc:'開啟 aapt300，系統自動沖暫估及預付待抵，財務端完整核對立帳內容、發票資料，維護分錄底稿後執行確認。',principle:'有預付待抵時的金額計算：應付總額 100,000 – 預付待抵 30,000 = 實際應付 70,000。暫估沖銷不改變金額，只改變帳款狀態（暫估→正式應付），是系統自動完成的。財務端的工作是確認沖銷結果正確，並完成分錄底稿維護。',error:'常見錯誤：未仔細核對分錄底稿就直接確認。確認後單據狀態鎖定，修改需沖銷重來，影響帳期及報表。寧可多花時間核對，也不要事後補救。',subs:[{l:'自動沖暫估',d:'若入庫單已有暫估應付（AAP009），系統自動以正式應付帳款取代暫估，金額不變。'},{l:'自動沖預付待抵',d:'若採購端步驟 4 有挑選待抵單，系統自動從應付金額中扣除已付訂金。'}],tags:[{t:'aapt300',c:'ts2'},{t:'立帳核對',c:'tc2'},{t:'分錄底稿維護',c:'ta2'}],note:'確認無誤後方可執行單據確認，確認後內容鎖定無法修改。',nt:'i'},
    {dept:'f',num:'財務端 — 步驟 8',title:'生成傳票並送主管審核後付款',desc:'確認 aapt300 後產生傳票，送主管審核，通過後進入 AAP019 付款流程。',principle:'有預付待抵分錄：借 應付帳款 100,000 / 貸 預付帳款 30,000 + 銀行存款 70,000。有暫估沖銷分錄：借 暫估應付 100,000 / 貸 應付帳款 100,000（兩筆傳票分開處理）。',error:null,subs:null,tags:[{t:'傳票生成',c:'ta2'},{t:'主管審核',c:'tc2'},{t:'付款處理',c:'ta2'}],note:null}
   ]},
  {id:'AAP008',label:'AAP008',title:'採購入庫單發票應付立帳流程',def:'一般正常進貨的月結立帳，無預付訂金，直接成立應付帳款。',depts:['p','f'],
   steps:[
    {dept:'p',num:'採購端 — 步驟 1',title:'確認入庫單狀態為「已過帳」',desc:'確認 apmt530 入庫單狀態為「已過帳」。',principle:'已過帳代表存貨正式入帳，才能進行應付立帳，否則帳實不符。',error:null,subs:null,tags:[{t:'apmt530',c:'ts2'},{t:'入庫確認',c:'tc2'}],note:'可用 aapq130 查詢未立帳清單，月底前全部處理完。',nt:'n'},
    {dept:'p',num:'採購端 — 步驟 2',title:'執行 aapp320 生成對帳單 aapt110',desc:'執行 aapp320，匯總條件選「1：交易對象」，對帳方式選「2：進貨發票立帳」。',principle:'aapp320 將入庫資訊彙整，依設定條件產生 aapt110 對帳單，是採購端月結作業的起點。',error:null,subs:[{l:'匯總條件',d:'選「1：交易對象」，同一廠商本月入庫合併一張。'},{l:'對帳方式',d:'選「2：進貨發票立帳」，依需求設定 QBE 條件。'}],tags:[{t:'aapp320',c:'ts2'},{t:'aapt110',c:'ts2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 3',title:'查看 aapt110 並核對發票金額',desc:'採購人員核對 aapt110 與廠商發票金額是否一致，確認後登錄發票明細。如有退倉單手動在單身挑選。',principle:'aapt110 金額來自入庫單，廠商發票是廠商開的，兩邊來源不同，需逐一核對確認一致。發現不一致必須與廠商確認，不可直接沿用系統金額。',error:'發票號碼輸入錯誤會導致進項稅額申報出問題，需事後向國稅局補正，務必對照實體發票逐字確認。',subs:null,tags:[{t:'aapt110',c:'ts2'},{t:'發票核對',c:'tc2'},{t:'登錄明細',c:'ta2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 4',title:'挑選待抵單並送主管審核',desc:'如有預付待抵，在單身來源作業挑選「27：其他待抵單」。無預付則直接送主管審核。',principle:'AAP008 大部分情況無預付訂金，此步驟通常直接跳過。若特殊情況有訂金（例如部分訂金的採購），才需要挑選待抵單。',error:null,subs:null,tags:[{t:'待抵單挑選',c:'ta2'},{t:'送審',c:'tc2'}],note:'若無預付待抵，此步驟直接略過。',nt:'n'},
    {dept:'p',num:'採購端 — 步驟 5',title:'主管審核並確認單據',desc:'主管核對無誤後執行確認，採購端完成，移交財務端。',principle:null,error:null,subs:null,tags:[{t:'主管確認',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 6',title:'執行 aapp132 拋轉至 aapt300',desc:'執行 aapp132 將 aapt110 拋轉至 aapt300，採購經手人同步送交實體發票及對帳資訊。',principle:'財務端需要原始憑證（實體發票）進行獨立核對，不能只看系統資料。這是雙重核對原則的體現，確保帳務正確性不依賴單一來源。',error:null,subs:null,tags:[{t:'aapp132',c:'ts2'},{t:'aapt300',c:'ts2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 7',title:'查看 aapt300 並確認立帳',desc:'AAP008 最常見情況（無暫估、無預付）：直接成立正式應付帳款，金額等於發票全額。若有暫估，系統自動沖銷。核對後維護分錄底稿並確認。',principle:'最常見傳票分錄（無暫估、無預付）：借 存貨/進貨成本 + 進項稅額 / 貸 應付帳款（含稅總額）。若有暫估：借 暫估應付 / 貸 應付帳款（金額不變，狀態從暫估變正式，系統自動完成，財務端確認結果即可）。',error:'常見錯誤：未確認暫估是否正確沖銷。同一批貨若暫估未被正式應付取代，會造成應付帳款重複計算，付款時多付錢。',subs:null,tags:[{t:'aapt300',c:'ts2'},{t:'立帳核對',c:'tc2'},{t:'分錄底稿維護',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 8',title:'生成傳票並送主管審核後付款',desc:'確認後產生傳票，送主管審核，通過後進入 AAP019 付款流程。',principle:null,error:null,subs:null,tags:[{t:'傳票生成',c:'ta2'},{t:'主管審核',c:'tc2'}],note:null}
   ]},
  {id:'AAP009',label:'AAP009',title:'入庫及倉退無發票暫估應付立帳',def:'月底貨到但發票未到，先建立暫估應付帳款，認列存貨成本。',depts:['f'],
   steps:[
    {dept:'f',num:'財務端 — 步驟 1',title:'收取憑證並送主管簽核',
     desc:'收到需求部門送來的入庫憑證（入庫單 + 廠商交貨單）或倉退憑證（倉退單 + 廠商確認憑證），依公司核准權限送主管簽核。',
     principle:'為什麼這個流程要特別送主管簽核？因為暫估是在「沒有發票」的情況下入帳，金額是估算的，不是發票確認的。比起有發票的正常立帳，暫估的風險較高，因此需要主管授權確認「這筆暫估合理、金額估算可接受」後，才能入帳。\n\n此外，需求部門（倉庫或使用部門）必須先完成系統確認及過帳（apmt570/apmt580），財務端才能進行暫估作業。財務端在送主管前應先確認前端是否已完成過帳。',
     error:'常見錯誤：收到憑證就直接執行 aapp131，未先確認前端過帳狀態。若入庫單未過帳，存貨未入帳，此時建立暫估應付帳款，會造成「存貨未增加但負債已出現」，資產負債表失真。',
     subs:[{l:'入庫情況需備文件',d:'入庫單（系統單號）+ 廠商交貨單（廠商提供的送貨憑證）'},{l:'倉退情況需備文件',d:'倉退單（系統單號）+ 廠商確認憑證（廠商簽名確認收到退貨的文件）'}],
     tags:[{t:'入庫單',c:'td2'},{t:'廠商交貨單',c:'td2'},{t:'主管簽核',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 2',title:'核對 apmt570 / apmt580 過帳狀態',
     desc:'主管簽核後，至 apmt570（入庫單維護作業）及 apmt580（採購倉退維護作業），確認需求部門主管已在系統上完成「確認/過帳（扣帳）」動作，方可繼續執行暫估作業。',
     principle:'這個核對動作是整個流程的關鍵前提。入庫單「過帳」代表存貨已正式增加；倉退單「過帳（扣帳）」代表存貨已正式減少。只有當存貨數量在系統中已更新，財務端建立的暫估應付帳款才能與存貨相對應，帳才會平。\n\n概念：存貨增加（入庫過帳）↔ 應付帳款增加（暫估立帳）；兩件事要同時成立，帳才正確。',
     error:'若發現前端尚未過帳，財務端應立即通知需求部門補完過帳動作，不可自行繼續暫估立帳。',
     subs:null,
     tags:[{t:'apmt570',c:'ts2'},{t:'apmt580',c:'ts2'},{t:'核對過帳',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 3',title:'月底執行 aapp131 批次暫估立帳',
     desc:'每月月底執行 aapp131，設定帳款單別（應付/倉退/費用）並輸入 QBE 條件（入退庫單號），批次掃描並自動產生 aapt320 暫估應付憑證。',
     principle:'為什麼需要批次作業？月底可能有數十甚至數百張入庫單尚未收到發票，若一張一張手動建立暫估，效率極低且容易遺漏。批次作業讓系統一次掃描所有符合條件的單據，統一產生暫估憑證。\n\n帳款單別的選擇決定了這批暫估是「公司欠廠商（應付）」還是「廠商欠公司（倉退）」，分類錯誤會導致後續沖銷出問題。',
     error:'常見錯誤：未填寫 QBE 條件就執行，導致將其他月份或已處理的單據也一起帶入，造成重複暫估。每次執行前務必填寫當月的入退庫單號範圍。',
     subs:[{l:'帳款單別：應付',d:'本月入庫、貨已到但發票未到的情況'},{l:'帳款單別：倉退',d:'本月倉退、廠商尚未開立折讓單的情況'},{l:'帳款單別：費用',d:'費用類入庫（如消耗品）尚未取得發票的情況'},{l:'QBE 條件：入退庫單號',d:'輸入本月要暫估的入退庫單號碼範圍，避免帶入不相關單據'}],
     tags:[{t:'aapp131',c:'ts2'},{t:'批次立帳',c:'ta2'}],note:'本流程產生的暫估應付，下個月收到發票後，執行 AAP008 正式立帳，系統會自動沖銷本次暫估。',nt:'n'},
    {dept:'f',num:'財務端 — 步驟 4',title:'檢核 aapt320 五大核對項目',
     desc:'aapp131 執行完後，開啟 aapt320 暫估應付憑證，逐筆依序確認五大項目，全部正確後方可確認單據。',
     principle:'為什麼要逐項檢核？批次作業是系統自動帶入，速度快但不保證每筆都正確。暫估金額本身已是估算，若科目、日期、性質再出錯，後續帳齡分析失真、付款時程混亂，且暫估確認後修改程序比正式應付更麻煩。',
     error:'最常見錯誤：帳款科目使用了彙總科目（上層科目），導致過帳時系統報錯。實科目是最底層、可直接記帳的科目，例如「應付帳款－國內廠商」而非只有「應付帳款」。',
     subs:[{l:'(1) 帳款單性質',d:'入庫暫估必須為「01：應付暫估」；倉退暫估必須為「02：倉退暫估」。性質錯誤，後續 AAP008 或 AAP010 沖銷時系統無法正確對應。'},{l:'(2) 帳款類別',d:'確認原料、商品、費用等分類符合本筆交易的實際性質，影響成本歸屬的正確性。'},{l:'(3) 帳款科目（需為實科目）',d:'必須是可直接記帳的最底層科目，不能使用彙總科目。過帳時若非實科目，系統會報錯無法過帳。'},{l:'(4) 應付款日 / 付款到期日',d:'應付款日：影響帳齡分析，決定這筆帳款算幾天了。付款到期日：影響實際付款時程，決定何時要付款給廠商。兩個日期都需確認計算正確。'},{l:'(5) 單身：存貨科目及帳款科目一致性',d:'單身（明細行）的帳款科目必須與單頭（主檔）的帳款科目完全一致。不一致會導致分錄借貸科目不對稱，造成帳務錯誤。'}],
     tags:[{t:'aapt320',c:'ts2'},{t:'五大核對項目',c:'tc2'}],note:'暫估應付確認後，進入 AGL002 日常會計作業流程完成過帳歸檔。',nt:'n'}
   ]},
  {id:'AAP010',label:'AAP010',title:'倉退單開立折讓應付待抵流程',def:'倉退單或折讓單開立折抵證明單成立應付款待抵帳款，並沖銷上期建立的暫估單。',depts:['p','f'],
   steps:[
    {dept:'p',num:'採購端 — 步驟 1',title:'確認倉退單狀態為「已過帳」',
     desc:'確認倉退單已完成「已過帳」狀態，代表退貨已從系統存貨中正式扣除。',
     principle:'已過帳代表兩件事：① 倉庫確認貨物已實際退出 ② 存貨數量已從系統中正式減少。未過帳就進行折讓立帳，會造成「存貨已退出但帳上仍在」，帳實不符，存貨科目虛增。',
     error:null,subs:null,tags:[{t:'倉退單',c:'td2'},{t:'過帳確認',c:'tc2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 2',title:'執行 aapp320 生成對帳單 aapt110',
     desc:'執行 aapp320 生成 aapt110，對帳來源選「5：發票扣抵單立帳」。注意：這與一般應付立帳的「2：進貨發票立帳」不同。',
     principle:'對帳來源的選擇決定了 aapt110 的性質：\n「2：進貨發票立帳」→ 成立應付帳款（公司欠廠商貨款，負債）\n「5：發票扣抵單立帳」→ 成立折讓應付待抵（廠商欠公司退貨金額，可抵扣貨款）\n兩者方向完全相反，選錯的話後續產生的單據性質就錯了，整個流程需要重來。',
     error:'高風險錯誤：誤選「2：進貨發票立帳」而非「5：發票扣抵單立帳」。這個錯誤在執行當下不會報錯，但後續財務端拋轉時會拋到錯誤的單據類型，導致整個流程需要作廢重做。',
     subs:null,tags:[{t:'aapp320',c:'ts2'},{t:'aapt110',c:'ts2'},{t:'發票扣抵單立帳',c:'ta2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 3',title:'查看 aapt110 並印出送主管簽核',
     desc:'查看生成的 aapt110 單據，確認折讓金額、對應倉退單號、廠商資訊正確，印出紙本送主管簽核。',
     principle:'這裡的核對重點與一般應付不同：除了金額正確，還要確認對帳來源是「5：發票扣抵單立帳」而非「2：進貨發票立帳」，確保後續財務端拋轉到正確的 aapt340 而非 aapt300。',
     error:null,subs:null,tags:[{t:'aapt110',c:'ts2'},{t:'紙本送審',c:'tc2'}],note:null},
    {dept:'p',num:'採購端 — 步驟 4',title:'主管同意後移交財務單位',
     desc:'主管簽核同意後，採購請款人將 aapt110 紙本連同廠商折讓單或折抵證明，一併送交財務單位進行後續流程作業。',
     principle:'廠商開立的折讓單或折抵證明是本流程最重要的原始憑證，代表廠商正式承認退貨事實。財務端需要此文件核對折讓金額，也是帳務上「有憑有據」的依據。',
     error:null,subs:null,tags:[{t:'主管同意',c:'tc2'},{t:'移交財務',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 5',title:'執行 aapp132 拋轉至 aapt340',
     desc:'執行 aapp132，將 aapt110 對帳單拋轉到 aapt340 折讓應付單。注意：本流程拋轉目標是 aapt340，而非一般應付的 aapt300。',
     principle:'aapt300（一般應付）= 公司欠廠商貨款，是負債，等付款沖銷。\naapt340（折讓應付）= 廠商欠公司退貨金額，方向相反，確認後產生應付待抵單，後續用來抵扣貨款。\n\n系統會依據 aapt110 的對帳來源（5：發票扣抵單立帳）自動拋到 aapt340，而非 aapt300。這也是為什麼採購端步驟 2 選對來源如此關鍵。',
     error:null,subs:null,tags:[{t:'aapp132',c:'ts2'},{t:'aapt340',c:'ts2'},{t:'拋轉折讓應付',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 6',title:'查看 aapt340 並檢核立帳內容',
     desc:'開啟 aapt340，系統自動沖銷上期暫估（如有）。完整核對折讓金額、廠商資訊、發票資料及分錄底稿，確認無誤後將應付單送主管覆審。',
     principle:'若這筆倉退在上個月底曾做過 AAP009 暫估，系統在此自動執行沖銷：借 倉退暫估應付 / 貸 應付帳款（aapt340）。暫估被正式折讓應付取代，帳務閉環完成。\n\n財務端核對重點：① 折讓金額與廠商折讓單或折抵證明一致 ② 廠商資訊正確 ③ 若有暫估沖銷，確認沖銷金額正確 ④ 分錄底稿科目正確。',
     error:'常見錯誤：未確認暫估是否已正確沖銷。若上期有暫估但本期未沖銷，會造成「倉退暫估」與「折讓應付」同時存在，負債重複計算。',
     subs:null,tags:[{t:'aapt340',c:'ts2'},{t:'自動沖暫估',c:'ta2'},{t:'分錄底稿維護',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 7',title:'主管覆審並確認單據',
     desc:'主管覆審全部內容無誤後，在系統上執行「確認」動作，單據狀態鎖定，系統自動產生應付待抵單。',
     principle:'確認後系統自動產生的「應付待抵單」是本流程最重要的產出。這張待抵單記錄廠商欠公司的折讓金額，後續在 AAP007-B 或 AAP008 月結請款時，採購端可在單身挑選此待抵單，從應付金額中扣除，實際付款金額因此減少。',
     error:null,subs:null,tags:[{t:'主管覆審',c:'tc2'},{t:'單據確認',c:'ta2'}],note:'確認後系統自動產生應付待抵單，後續月結請款時用來抵扣貨款，減少實際付款金額。',nt:'n'},
    {dept:'f',num:'財務端 — 步驟 8',title:'生成傳票並執行後續付款',
     desc:'確認後的 aapt340 單據生成正式傳票，送主管審核後，依需要進行後續付款處理（對應 AAP019 付款核銷流程）。',
     principle:'折讓應付的傳票分錄：\n無暫估情況：借 存貨（退回）/ 貸 應付帳款（aapt340）\n有暫估沖銷：借 倉退暫估應付 / 貸 應付帳款\n\n注意：AAP010 產生的是「應付待抵」，通常不會直接產生付款，而是等下次請款時用來抵扣，減少付款金額。',
     error:null,subs:null,tags:[{t:'傳票生成',c:'ta2'},{t:'付款處理',c:'ta2'}],note:'本流程產生的應付待抵單，後續在 AAP007-B 或 AAP008 步驟 4 挑選「27：其他待抵單」時使用。',nt:'n'}
   ]},
  {id:'AGL002',label:'AGL002',title:'日常會計作業流程',def:'處理一般日常會計傳票編制，涵蓋各子模組拋轉及人工傳票輸入。',depts:['f'],
   steps:[
    {dept:'f',num:'財務端 — 步驟 1',title:'由子模組底稿拋轉至正式傳票',
     desc:'各子模組（AR/AP/FA/NM/FM/XC/CE/RA）在正式拋轉前，會先產生「分錄底稿」供會計事先檢核。確認底稿內容正確後，才執行拋轉生成正式傳票。',
     principle:'AGL002 是所有 AAP 流程的最終匯集點。無論是 AAP007-A 的預付傳票、AAP008 的應付傳票、AAP009 的暫估傳票，還是 AAP010 的折讓傳票，最終都要經過 AGL002 完成過帳歸檔，才正式進入總帳，影響財務報表數字。\n\n分錄底稿是傳票的草稿，此時可以修改科目及金額。一旦拋轉成正式傳票並執行過帳，修改程序就複雜許多，需要沖銷傳票再重建。因此在底稿階段確認正確是最有效率的做法。',
     error:'常見錯誤：底稿未仔細核對就直接拋轉，等過帳後才發現科目或金額有誤，需沖銷重來，影響帳期。',
     subs:[{l:'AP（應付模組）',d:'AAP007-A 預付、AAP007-B 月結、AAP008 發票立帳、AAP009 暫估、AAP010 折讓等流程產生的所有應付傳票'},{l:'AR（應收模組）',d:'客戶應收帳款、收款等相關傳票'},{l:'FA（固資模組）',d:'固定資產折舊提列、資產處分等相關傳票'},{l:'NM（票據資金模組）',d:'應付票據開立、票據到期兌付、資金調度等相關傳票'},{l:'FM（投資融資模組）',d:'投資損益認列、借款利息等相關傳票'},{l:'XC（成本模組）',d:'存貨成本結轉、製造費用分攤等相關傳票'},{l:'CE（結轉傳票）',d:'月底損益結轉至保留盈餘，通常由系統自動產生'},{l:'RA（迴轉傳票）',d:'下個月初自動沖銷上期暫估，確保暫估不會持續累積'}],
     tags:[{t:'分錄底稿',c:'ts2'},{t:'拋轉正式傳票',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 2',title:'輸入或補充傳票內容',
     desc:'依傳票來源不同，處理方式不同：前端系統拋轉（來源碼非 GL）只能補充摘要說明；人工輸入（來源碼 GL）則需完整輸入傳票內容。',
     principle:'為什麼前端拋轉的傳票不能修改分錄？\n因為分錄是從前端單據（如 aapt300、aapt320）自動帶入的，代表前端單據的帳務結果。若財務端可以隨意修改，就破壞了前端單據的控制意義，使內部控制形同虛設。如果認為分錄有誤，正確做法是回到前端單據修正，而非直接改傳票。\n\n人工傳票（GL）則完全由會計自行輸入，包含借貸科目、金額、各核算項（部門、專案、成本中心）及立沖資料。這類傳票沒有前端單據支撐，更需要完整的摘要說明供日後稽核。',
     error:'常見錯誤：摘要填寫「代墊費用」「雜項」等過於籠統的說明。日後稽核或對帳時完全無法辨識。建議格式：流程/事由 + 廠商/對象 + 年月，例如「AAP008 進貨立帳-台灣電子-2024/01」或「辦公室租金-XX大樓-2024/01」。',
     subs:[{l:'前端拋轉（來源碼非 GL）',d:'AP、AR、FA、NM、FM、XC、CE、RA 等模組產生的傳票。分錄已自動帶入，財務端僅能補充摘要說明，不能修改借貸科目及金額。'},{l:'人工輸入（來源碼 GL）',d:'無對應前端單據的日常事項，如折舊提列、費用計提、期末調整。需完整輸入：借貸科目、金額、核算項設置（部門/專案）及立沖資料（如有）。'}],
     tags:[{t:'傳票輸入',c:'ta2'},{t:'摘要補充',c:'ta2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 3',title:'傳票確認並進入簽核流程',
     desc:'傳票輸入完成後執行「確認」動作，傳票進入簽核流程（紙本簽核或電子簽核），簽核完成後才能列印正式傳票憑證。',
     principle:'簽核流程的目的是確保每一張傳票都有授權人確認，防止未授權的帳務記錄進入總帳。簽核完成前不能列印正式傳票憑證，避免未審核的傳票被誤作正式憑證使用。\n\n紙本簽核：列印傳票草稿，逐層交主管簽名蓋章後歸還會計。\n電子簽核：系統線上送審，主管在系統上電子確認，效率較高。',
     error:'常見錯誤：傳票確認後忘記追蹤簽核進度，導致傳票停留在待簽核狀態，月底結帳前無法過帳，影響當月財務報表。建議建立定期追蹤機制，確保簽核不拖延。',
     subs:null,tags:[{t:'傳票確認',c:'tc2'},{t:'簽核流程',c:'tc2'},{t:'列印傳票',c:'td2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 4',title:'傳票審核、過帳並歸檔',
     desc:'簽核完成後，依序執行傳票審核（最終確認）→ 過帳（正式記入總帳）→ 歸檔（連同憑證整理存放）。',
     principle:'過帳是整個帳務流程的終點，也是最不可逆的動作。\n\n過帳後發生的事：① 各會計科目餘額正式更新 ② 財務報表（資產負債表、損益表）數字更新 ③ 傳票狀態變為「已過帳」，無法再直接修改。\n\n過帳前所有的單據、底稿、傳票都只是系統中的資料，只有過帳後才真正「記帳」，反映在對外的財務報表上。因此，過帳前的最終審核是最後一道品質把關。\n\n歸檔的重要性：傳票連同相關憑證（發票、入庫單、簽核記錄）必須完整歸檔，這是法律規定的憑證保存義務，也是外部稽核（查帳）時的主要查核對象。',
     error:'嚴重錯誤：過帳後發現科目或金額有誤，無法直接修改。必須建立「沖銷傳票」（原傳票的借貸對調）來取消原傳票效果，再重新建立正確傳票，並附上說明文件。這個程序繁複且影響當月報表，務必在過帳前完成最終確認，避免此情況發生。',
     subs:null,tags:[{t:'傳票審核',c:'tc2'},{t:'過帳',c:'ta2'},{t:'歸檔',c:'ta2'}],note:'過帳後傳票不可直接修改，若需更正須建立沖銷傳票，程序繁複。過帳前請務必完成最終確認。',nt:'i'}
   ]},
  {id:'AAP019',label:'AAP019',title:'應付帳款付款流程',def:'依應付請款逐筆完成核銷，並送交資金單位依時程匯款。',depts:['f'],
   steps:[
    {dept:'f',num:'財務端 — 步驟 1',title:'執行 aapp400 生成 aapt420 付款核銷單',
     desc:'每日或準備出帳前，執行 aapp400，系統掃描所有已確認但尚未付款的應付帳款，依付款到期日批次產生 aapt420 付款核銷單。建議先用 aapq400 預覽，確認無誤後再正式執行。',
     principle:'AAP019 是整個應付帳款作業循環的最後一哩路。前面所有流程（AAP007-A 預付、AAP007-B 月結、AAP008 發票立帳）建立的應付帳款，最終都在此完成付款核銷，資金才真正流出公司帳戶，廠商才收到款項。\n\naapq400 的「預覽」功能非常重要：讓你在正式執行前先確認這次要付的廠商清單和金額，避免付錯或漏付。這就像網路購物結帳前的「確認訂單」頁面，確認完再按付款。',
     error:'常見錯誤：跳過 aapq400 預覽直接執行 aapp400。雖然可以這樣做，但萬一有問題（例如某筆應付金額異常），在預覽階段發現比執行後才發現容易處理。',
     subs:null,tags:[{t:'aapp400',c:'ts2'},{t:'aapt420',c:'ts2'},{t:'拋轉未付款',c:'ta2'}],note:'建議先執行 aapq400 查詢未付未沖單據，模擬本次付款金額及廠商清單，確認無異常後再執行 aapp400。',nt:'n'},
    {dept:'f',num:'財務端 — 步驟 2',title:'查詢 aapt420 並核對付款資訊',
     desc:'逐筆核對 aapt420 付款核銷單的兩大重點：① 在「付款及差異處理」單身確認款別方式正確 ② 若款別為「20：銀行電匯款」，須確認受款帳戶資訊（銀行名稱、分行、帳號、戶名）完整正確。核對無誤後產生分錄底稿。',
     principle:'款別方式決定資金單位用什麼方式付款：\n10＝現金付款：適用小額或即時付款\n20＝銀行電匯：最常見，透過網路銀行或臨櫃匯款\n30＝票據付款：開立支票交給廠商\n\n選錯款別，資金單位會用錯誤方式付款，例如應該匯款卻被要求開票，造成作業混亂。\n\n銀行電匯帳戶核對特別重要：廠商帳戶是靜態資料，長期不更新容易失效。每次付款前確認，是防止匯款失敗或匯錯帳戶的最後防線。',
     error:'高風險錯誤：廠商更換銀行帳戶後未通知（或通知了但系統未更新），導致款項匯到已停用的舊帳戶。後續追回款項程序繁複且耗時。建議付款前若有疑慮，電話向廠商確認帳戶資訊。',
     subs:[{l:'款別 10：現金付款',d:'小額或特殊情況使用，需確認付款方式與廠商約定一致。'},{l:'款別 20：銀行電匯款',d:'最常見款別。必須確認受款帳戶：銀行名稱、分行代碼、帳號、戶名四項均須完整且最新。'},{l:'款別 30：票據付款',d:'開立應付票據（支票）交給廠商，需確認票據金額、日期、抬頭正確。'}],
     tags:[{t:'aapt420',c:'ts2'},{t:'款別核對',c:'tc2'},{t:'受款帳戶',c:'tc2'}],note:null},
    {dept:'f',num:'財務端 — 步驟 3',title:'生成總帳傳票並送交資金單位付款',
     desc:'帳務人員將已確認的 aapt420 核銷單生成總帳傳票，連同付款清單送交資金單位，依指定付款方式執行實際匯款或開票（適用台灣地區）。',
     principle:'傳票分錄說明：\n一般付款（無待抵）：借 應付帳款 100,000 / 貸 銀行存款 100,000\n有折讓待抵（AAP010 產生的待抵單）：借 應付帳款 100,000 / 貸 應付待抵 30,000 + 銀行存款 70,000\n\n「應付待抵」在此被沖銷：廠商欠公司的退貨金額（待抵）與公司欠廠商的貨款（應付）相互抵消，只有差額需要實際匯款。這就是「待抵」的最終作用。\n\n付款完成後，應付帳款科目餘額歸零，整個應付帳款循環（從採購訂貨到最終付款）正式完成。',
     error:'常見錯誤：帳務人員生成傳票後，未確認資金單位已實際執行匯款。帳上已核銷但款項未匯出，廠商來催款時才發現。建議建立付款後的確認機制，例如要求資金單位回傳匯款憑證。',
     subs:null,tags:[{t:'總帳傳票',c:'ta2'},{t:'應付票',c:'td2'},{t:'銀行匯款',c:'ta2'}],note:null}
   ]}
];
const modules={
  prog:[
    {code:'aapp131',name:'暫估應付批次立帳',desc:'月底執行，批次掃描已過帳但未取得發票的入退庫單，自動產生 aapt320 暫估應付憑證。',flows:['AAP009']},
    {code:'aapp132',name:'請款單拋轉應付帳款單',desc:'將 aapt110 對帳單拋轉至財務模組。一般應付→aapt300；折讓應付→aapt340。',flows:['AAP007-B','AAP008','AAP010']},
    {code:'aapp134',name:'預付訂金拋轉應付單',desc:'將採購單訂金資訊轉換為 aapt310 預付請款單。採購模組與財務模組的橋梁。',flows:['AAP007-A']},
    {code:'aapp320',name:'生成供應商對帳單',desc:'彙整入庫/倉退資訊產生 aapt110。對帳方式 2=進貨發票立帳；5=發票扣抵單立帳。',flows:['AAP007-B','AAP008','AAP010']},
    {code:'aapp400',name:'應付未付款拋轉付款核銷單',desc:'掃描已確認但尚未付款的應付帳款，依付款到期日批次產生 aapt420 付款核銷單。',flows:['AAP019']}
  ],
  doc:[
    {code:'aapt110',name:'供應商對帳單',desc:'採購端月結整帳核心單據。登錄發票明細、併入退倉單、挑選「27：其他待抵單」均在此操作。',flows:['AAP007-B','AAP008','AAP010']},
    {code:'aapt300',name:'應付帳款單',desc:'一般應付帳款單據。財務端核對立帳、維護分錄底稿的主要作業畫面。自動沖暫估/預付待抵。',flows:['AAP007-B','AAP008']},
    {code:'aapt310',name:'預付請款單',desc:'由 aapp134 產生。財務主管確認後自動產生待抵單，狀態鎖定不可修改。',flows:['AAP007-A']},
    {code:'aapt320',name:'暫估應付憑證',desc:'由 aapp131 批次產生。需逐項檢核五大項目：性質、類別、科目（實科目）、應付款日、單身科目一致性。',flows:['AAP009']},
    {code:'aapt340',name:'折讓應付單',desc:'倉退折讓專用。性質與 aapt300 相反（廠商欠公司）。確認後產生應付待抵單供後續抵扣。',flows:['AAP010']},
    {code:'aapt420',name:'付款核銷單',desc:'由 aapp400 批次產生。記錄付款明細及款別方式，確認後生成總帳傳票。',flows:['AAP019']},
    {code:'apmt530',name:'入庫單維護作業',desc:'確認入庫單「已過帳」狀態，代表存貨正式入帳。月結前必須確認。',flows:['AAP007-B','AAP008']},
    {code:'apmt570',name:'入庫單維護（暫估用）',desc:'暫估作業前，財務端核對需求部門主管是否已完成入庫單確認/過帳。',flows:['AAP009']},
    {code:'apmt580',name:'採購倉退維護作業',desc:'暫估作業前，財務端核對需求部門主管是否已完成倉退單確認/過帳（扣帳）。',flows:['AAP009']}
  ],
  query:[
    {code:'aapq130',name:'未立暫估及未立帳查詢',desc:'月底結帳前掃描本月哪些入庫單還未立帳或暫估，避免漏帳影響當月財務報表。',flows:['AAP007-B','AAP008']},
    {code:'aapq160',name:'採購單訂金立帳查詢',desc:'查詢尚未申請預付的採購資料，協助採購端掌握待處理的預付作業清單。',flows:['AAP007-A']},
    {code:'aapq400',name:'未付未沖單據查詢',desc:'執行 aapp400 前模擬本次付款金額及廠商清單，預覽確認後再正式執行，避免付錯或漏付。',flows:['AAP019']}
  ]
};

let curFlowIdx=0,curStep=0,curDept='p';

function showOverview(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-overview').classList.add('active');
}
function showFlow(idx){
  curFlowIdx=idx;const f=flows[idx];curDept=f.depts[0];curStep=0;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-flow').classList.add('active');
  renderFlow();
}
function showModuleRef(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-modules').classList.add('active');
  renderModules();
}
function renderOverview(){
  const grid=document.getElementById('flow-grid');
  grid.innerHTML=flows.map((f,i)=>{
    const badge=f.id.startsWith('AGL')?'bc-o':'bc-p';
    return `<div class="flow-card" onclick="showFlow(${i})">
      <div class="fc-badge ${badge}">${f.label}</div>
      <div class="fc-title">${f.title}</div>
      <div class="fc-def">${f.def}</div>
      <div class="fc-meta">
        ${f.depts.includes('p')?'<span class="fc-tag ft-p">採購端</span>':''}
        ${f.depts.includes('f')?'<span class="fc-tag ft-f">財務端</span>':''}
        <span class="fc-tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${f.steps.length} 步驟</span>
      </div>
    </div>`;
  }).join('');
}
function renderFlow(){
  const f=flows[curFlowIdx];const isP=curDept==='p';
  document.getElementById('breadcrumb').innerHTML=`<span>${f.label}</span>`;
  document.getElementById('fv-code').innerHTML=`<span class="tag ts2">${f.label}</span>`;
  document.getElementById('fv-title').textContent=f.title;
  document.getElementById('fv-def').textContent=f.def;
  const deptTabs=document.getElementById('dept-tabs');
  let dtHtml='';
  if(f.depts.includes('p'))dtHtml+=`<button class="dt${curDept==='p'?' ap':''}" onclick="setDept('p')">採購端</button>`;
  if(f.depts.includes('f'))dtHtml+=`<button class="dt${curDept==='f'?' af':''}" onclick="setDept('f')">財務端</button>`;
  deptTabs.innerHTML=dtHtml;
  const ds=f.steps.filter(s=>s.dept===curDept);
  const s=ds[curStep];
  const pct=((curStep+1)/ds.length)*100;
  const fill=document.getElementById('pfill');
  fill.className='pfill '+(curDept==='p'?'bp':'bf');
  fill.style.width=pct+'%';
  let html='<div class="step-card">';
  html+=`<div class="snum ${curDept==='p'?'snp':'snf'}">${s.num}</div>`;
  html+=`<div class="stitle">${s.title}</div>`;
  html+=`<div class="content-tabs">
    <button class="ctab active" onclick="switchTab(this,'tab-op')">操作說明</button>
    <button class="ctab" onclick="switchTab(this,'tab-why')">作業原理</button>
    ${s.error?'<button class="ctab" onclick="switchTab(this,\'tab-err\')">常見錯誤</button>':''}
  </div>`;
  html+=`<div class="ctab-content active" id="tab-op">`;
  html+=`<div class="sdesc">${s.desc}</div>`;
  if(s.subs){html+='<div class="subs">';s.subs.forEach(sub=>{html+=`<div class="sub"><b>${sub.l}</b>${sub.d}</div>`;});html+='</div>';}
  if(s.note){const cls=s.nt==='i'?'info-box':'note-box';const icon=s.nt==='i'?'ti-info-circle':'ti-alert-triangle';html+=`<div class="${cls}"><i class="ti ${icon}" style="margin-right:4px"></i>${s.note}</div>`;}
  if(s.tags){html+='<div class="tags">';s.tags.forEach(t=>{html+=`<span class="tag ${t.c}">${t.t}</span>`;});html+='</div>';}
  html+='</div>';
  html+=`<div class="ctab-content" id="tab-why">`;
  if(s.principle){
    const lines=s.principle.split('\n');
    html+=`<div class="principle-box" style="border-left-color:${curDept==='p'?'#378ADD':'#1D9E75'}"><i class="ti ti-bulb" style="margin-right:4px"></i>`;
    html+=lines.map((l,i)=>i===0?l:`<br><br>${l}`).join('');
    html+=`</div>`;
  } else {
    html+='<div class="sdesc" style="font-style:italic">此步驟為標準操作，無特殊原理說明。</div>';
  }
  html+='</div>';
  if(s.error){html+=`<div class="ctab-content" id="tab-err"><div class="error-box"><i class="ti ti-alert-triangle" style="margin-right:4px"></i>${s.error}</div></div>`;}
  html+='</div>';
  document.getElementById('step-content').innerHTML=html;
  document.getElementById('scount').textContent=`${curStep+1} / ${ds.length}`;
  document.getElementById('btn-prev').disabled=curStep===0;
  const nb=document.getElementById('btn-next');
  if(curStep===ds.length-1){
    nb.innerHTML='完成 ✓';nb.className='nb2 '+(curDept==='p'?'pp':'pf');nb.onclick=showDone;nb.disabled=false;
  } else {
    nb.innerHTML='下一步 <i class="ti ti-arrow-right"></i>';nb.className='nb2 '+(curDept==='p'?'pp':'pf');nb.onclick=()=>navStep(1);nb.disabled=false;
  }
}
function switchTab(btn,id){
  btn.closest('.step-card').querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.step-card').querySelectorAll('.ctab-content').forEach(t=>t.classList.remove('active'));
  const el=btn.closest('.step-card').querySelector('#'+id);
  if(el)el.classList.add('active');
}
function setDept(d){curDept=d;curStep=0;renderFlow();}
function navStep(dir){
  const f=flows[curFlowIdx];const ds=f.steps.filter(s=>s.dept===curDept);
  const ni=curStep+dir;if(ni>=0&&ni<ds.length){curStep=ni;renderFlow();}
}
function showDone(){
  const f=flows[curFlowIdx];
  document.getElementById('step-content').innerHTML=`<div class="done-wrap"><div style="font-size:28px;color:#1D9E75;margin-bottom:10px"><i class="ti ti-circle-check"></i></div><h3>${curDept==='p'?'採購端':'財務端'}流程完成</h3><p>${f.label} 此階段已全部完成。</p><button class="rb" onclick="restart()"><i class="ti ti-refresh"></i> 重新開始</button></div>`;
  document.getElementById('btn-prev').disabled=true;document.getElementById('btn-next').disabled=true;
  document.getElementById('pfill').style.width='100%';
}
function restart(){curStep=0;document.getElementById('btn-next').disabled=false;renderFlow();}
function renderModules(){
  const c=document.getElementById('module-content');let h='';
  const sections=[{label:'批次作業程式（aapp）',key:'prog',badge:'ts2'},{label:'單據維護作業（aapt / apmt）',key:'doc',badge:'ta2'},{label:'查詢作業（aapq）',key:'query',badge:'tc2'}];
  sections.forEach(sec=>{
    h+=`<div class="sec-label">${sec.label}</div><div class="module-grid">`;
    modules[sec.key].forEach(m=>{
      h+=`<div class="mod-card"><div class="mod-code-badge ${sec.badge}">${m.code}</div><div class="mod-name">${m.name}</div><div class="mod-desc">${m.desc}</div><div class="mod-flows">${m.flows.map(f=>`<span class="mod-flow-tag ts2">${f}</span>`).join('')}</div></div>`;
    });
    h+='</div>';
  });
  c.innerHTML=h;
}
renderOverview();
</script>
