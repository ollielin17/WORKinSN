function makeNode(n, depth) {
  const div = document.createElement('div');
  div.className = 'node';

  const hdr = document.createElement('div');
  hdr.className = 'node-header' + (depth === 0 ? ' root-header' : '');

  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  const hasChildren = n.children && n.children.length > 0;
  const hasDetail = !!n.detail;
  toggle.textContent = hasChildren ? (n.open !== false ? '▾' : '▸') : (hasDetail ? '·' : ' ');

  const lbl = document.createElement('span');
  lbl.className = 'label';
  lbl.textContent = n.label;

  hdr.appendChild(toggle);
  hdr.appendChild(lbl);

  if (n.badge) {
    const b = document.createElement('span');
    b.className = 'badge ' + (n.badgeClass || 'badge-gray');
    b.textContent = n.badge;
    hdr.appendChild(b);
  }

  div.appendChild(hdr);

  let detailEl = null;
  if (hasDetail) {
    detailEl = document.createElement('div');
    detailEl.className = 'detail hidden';
    detailEl.style.whiteSpace = 'pre-line';
    detailEl.textContent = n.detail;
    div.appendChild(detailEl);
  }

  let childWrap = null;
  if (hasChildren) {
    childWrap = document.createElement('div');
    childWrap.className = 'children';
    if (n.open === false) childWrap.style.display = 'none';
    n.children.forEach(c => childWrap.appendChild(makeNode(c, depth + 1)));
    div.appendChild(childWrap);
  }

  let detailOpen = false;
  let childOpen = n.open !== false;

  hdr.addEventListener('click', () => {
    if (hasChildren) {
      childOpen = !childOpen;
      childWrap.style.display = childOpen ? '' : 'none';
      toggle.textContent = childOpen ? '▾' : '▸';
    } else if (hasDetail) {
      detailOpen = !detailOpen;
      detailEl.classList.toggle('hidden', !detailOpen);
      toggle.textContent = detailOpen ? '▴' : '·';
    }
  });

  return div;
}

const tree = document.getElementById('tree');

const secA = document.createElement('div');
secA.className = 'section-title';
secA.textContent = '▌ 庫存數量相關';
tree.appendChild(secA);
tree.appendChild(makeNode(data[0], 0));

secB.className = 'section-title';
secB.style.marginTop = '12px';

tree.appendChild(secB);
tree.appendChild(makeNode(data[1], 0));
</script>
