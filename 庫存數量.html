function buildCard(c) {
  const card = document.createElement('div');
  card.className = 'card';

  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.innerHTML = `<i class="ti ${c.icon} card-icon" aria-hidden="true"></i><span class="card-title">${c.title}</span><span class="card-tag ${c.tagClass}">${c.tag}</span><span class="chevron">▾</span>`;

  const body = document.createElement('div');
  body.className = 'card-body';

  let html = '';
  if (c.situation) {
    html += `<div class="situation"><div class="sit-label">什麼情況</div><div class="sit-text">${c.situation}</div></div>`;
  }
  if (c.path) {
    html += `<div class="path"><i class="ti ti-route" style="font-size:13px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>${c.path}</div>`;
  }
  if (c.steps && c.steps.length) {
    html += `<div class="steps"><div class="step-label">怎麼做</div>`;
    c.steps.forEach((s, i) => {
      html += `<div class="step"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`;
    });
    html += `</div>`;
  }
  if (c.note) {
    html += `<div class="note">${c.note.replace(/\n/g,'<br>')}</div>`;
  }

  body.innerHTML = html;

  let open = false;
  hdr.addEventListener('click', () => {
    open = !open;
    body.className = 'card-body' + (open ? ' open' : '');
    hdr.querySelector('.chevron').className = 'chevron' + (open ? ' open' : '');
  });

  card.appendChild(hdr);
  card.appendChild(body);
  return card;
}

const root = document.getElementById('root');
sections.forEach(sec => {
  const t = document.createElement('div');
  t.className = 'sec-title';
  t.textContent = sec.title;
  root.appendChild(t);
  sec.cards.forEach(c => root.appendChild(buildCard(c)));
});
