<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>應付帳款作業導覽</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-muted: #A09D96;
    --accent-prok: #4B44C4;
    --accent-fin: #0F7A5A;
    --tag-op: #FAEEDA;
    --tag-op-text: #7A4A08;
    --tag-op-border: #F0C870;
    --tag-doc: #E8F4FF;
    --tag-doc-text: #1A5494;
    --tag-doc-border: #A8CFEE;
    --radius: 12px;
    --radius-sm: 7px;
  }

  body {
    background: var(--bg);
    font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    color: var(--text-primary);
  }

  .header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 28px;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .progress-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent-prok);
    transition: width .4s ease;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
  }

  .card-step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dept-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    letter-spacing: .05em;
  }
  .dept-prok  { background: #EEEDFE; color: var(--accent-prok); }
  .dept-fin   { background: #DFF5ED; color: var(--accent-fin); }
  .dept-both  { background: #F3F3F3; color: #555; }

  .card-title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .card-desc {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .card-desc ul { padding-left: 18px; }
  .card-desc li { margin-bottom: 4px; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid;
  }
  .tag-op   { background: var(--tag-op);  color: var(--tag-op-text);  border-color: var(--tag-op-border); }
  .tag-doc  { background: var(--tag-doc); color: var(--tag-doc-text); border-color: var(--tag-doc-border); }
  .tag-icon { font-size: 12px; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .choice-btn:hover {
    border-color: var(--accent-prok);
    background: #FAFAFE;
    transform: translateY(-1px);
  }
  .choice-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .choice-label { font-size: 13.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
  .choice-sub   { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  .nav { display: flex; gap: 10px; align-items: center; }
  .btn-back {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: border-color .15s;
  }
  .btn-back:hover { border-color: #aaa; }
  .btn-next {
    background: var(--accent-prok);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 22px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: opacity .15s;
    margin-left: auto;
  }
  .btn-next:hover { opacity: .85; }
  .btn-restart {
    background: #F0EEE8;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: background .15s;
  }
  .btn-restart:hover { background: #E4E2DC; }

  .done-icon  { font-size: 36px; margin-bottom: 12px; }
  .done-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .done-sub   { font-size: 13.5px; color: var(--text-secondary); line-height: 1.7; }

  .trail {
    width: 100%; max-width: 680px;
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px;
  }
  .trail-item {
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 4px;
  }
  .trail-item:not(:last-child)::after { content: '›'; margin-left: 4px; }
  .trail-item.active { color: var(--text-primary); font-weight: 500; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">應付帳款作業導覽</div>
  <div class="header-title">我現在要做什麼？</div>
</div>

<div class="progress-wrap hidden" id="progressWrap">
  <div class="progress-meta">
    <span id="progressLabel">選擇情境</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

<div id="screen"></div>

const SCENARIO_LABEL = {
  '007':'AAP007 採購預付請款',
  '008':'AAP008 入庫發票立帳',
  '009':'AAP009 暫估應付立帳',
  '010':'AAP010 倉退折讓立帳',
  '019':'AAP019 付款核銷'
};

let state = { phase:'select', flow:null, step:0 };

function setState(patch){ Object.assign(state, patch); render(); }

function render(){
  const screen = document.getElementById('screen');
  const trail  = document.getElementById('trail');
  const progW  = document.getElementById('progressWrap');

  if(state.phase === 'select'){
    progW.classList.add('hidden');
    trail.innerHTML = '';
    screen.innerHTML = renderSelect();
  } else {
    progW.classList.remove('hidden');
    renderProgress();
    renderTrail();
    screen.innerHTML = renderStep();
  }
}

function renderSelect(){
  const scenarios = [
    { id:'007', icon:'💰', label:'採購預付請款', sub:'採購單含訂金，需先付定金給供應商' },
    { id:'008', icon:'📄', label:'入庫發票應付立帳', sub:'收到貨物入庫並取得供應商發票，正式成立應付帳款' },
    { id:'009', icon:'⏳', label:'暫估應付立帳', sub:'月底前尚未取得發票，先暫估認列應付與成本' },
    { id:'010', icon:'↩️', label:'倉退折讓待抵立帳', sub:'退貨倉退，建立折讓扣抵憑證成立待抵款' },
    { id:'019', icon:'🏦', label:'應付帳款付款核銷', sub:'已有應付傳票，準備出款核銷' },
  ];
  return `
    <div class="card">
      <div class="card-step-label">選擇情境</div>
      <div class="card-title">目前要處理哪一種情況？</div>
      <div class="card-desc" style="margin-bottom:0">點選符合的情境，導覽將帶你逐步完成。</div>
    </div>
    <div class="card" style="padding:16px">
      <div class="choices">
        ${scenarios.map(s=>`
          <button class="choice-btn" onclick="startFlow('${s.id}')">
            <span class="choice-icon">${s.icon}</span>
            <div>
              <div class="choice-label">${s.label}</div>
              <div class="choice-sub">${s.sub}</div>
            </div>
          </button>
        `).join('')}
      </div>
    </div>`;
}

function renderProgress(){
  const steps = FLOWS[state.flow];
  const total  = steps.length;
  const current= state.step;
  const pct    = Math.round((current / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `步驟 ${current+1} / ${total}`;
  document.getElementById('progressPct').textContent   = pct + '%';
}

function renderTrail(){
  const trail = document.getElementById('trail');
  const label = SCENARIO_LABEL[state.flow] || '';
  trail.innerHTML = `
    <div class="trail-item">應付帳款導覽</div>
    <div class="trail-item active">${label}</div>`;
}

function renderStep(){
  const steps = FLOWS[state.flow];
  const s     = steps[state.step];
  const isLast= state.step === steps.length - 1;
  const isFirst=state.step === 0;

  if(s.done || isLast){
    return `
      <div class="card" style="text-align:center;padding:40px 28px">
        <div class="done-icon">✅</div>
        <div class="done-title">流程完成</div>
        <div class="done-sub">${SCENARIO_LABEL[state.flow]} 的步驟已全數完成。<br>如有傳票需過帳，請依 AGL002 日常會計流程繼續處理。</div>
        <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn-restart" onclick="setState({phase:'select',flow:null,step:0})">← 回到情境選擇</button>
          ${state.flow !== '019' ? `<button class="btn-next" onclick="startFlow('019')">繼續 → AAP019 付款核銷</button>` : ''}
        </div>
      </div>`;
  }

  const deptColor = s.dept==='採購' ? 'dept-prok' : s.dept==='財務' ? 'dept-fin' : 'dept-both';
  const opTags  = (s.ops||[]).map(o=>`<span class="tag tag-op"><span class="tag-icon">⬡</span>${o}</span>`).join('');
  const docTags = (s.docs||[]).map(d=>`<span class="tag tag-doc"><span class="tag-icon">□</span>${d}</span>`).join('');
  const hasTags = opTags || docTags;

  return `
    <div class="card">
      <div class="card-step-label">
        步驟 ${state.step+1}
        <span class="dept-badge ${deptColor}">${s.dept}</span>
      </div>
      <div class="card-title">${s.title}</div>
      <div class="card-desc">
        ${s.desc}
        ${s.detail ? `<div style="margin-top:8px">${s.detail}</div>` : ''}
      </div>
      ${hasTags ? `<div class="tags">${opTags}${docTags}</div>` : ''}
      <div class="nav">
        ${!isFirst ? `<button class="btn-back" onclick="setState({step:${state.step-1}})">← 上一步</button>` : ''}
        <button class="btn-next" onclick="setState({step:${state.step+1}})">下一步 →</button>
      </div>
    </div>
    <div class="card" style="padding:14px 20px;opacity:.7">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:600;letter-spacing:.08em;text-transform:uppercase">下一步預覽</div>
      <div style="font-size:13px;color:var(--text-secondary)">${steps[state.step+1] ? steps[state.step+1].title : '流程完成'}</div>
    </div>`;
}

function startFlow(id){ setState({ phase:'flow', flow:id, step:0 }); }

render();
</script>
</body>
</html>
