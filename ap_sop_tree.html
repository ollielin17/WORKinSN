<rect x="356" y="974" width="10" height="10" rx="2" fill="#534AB7"/>
<text x="371" y="984" font-size="10" fill="#888">點擊節點查看說明</text>

</svg>

<div id="tt"></div>
<script>
function tip(e,t){
  var el=document.getElementById('tt');
  el.textContent=t;
  el.style.display='block';
  el.style.left=(e.clientX+14)+'px';
  el.style.top=(e.clientY-10)+'px';
  clearTimeout(el._h);
  el._h=setTimeout(function(){el.style.display='none'},5000);
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.nd'))document.getElementById('tt').style.display='none';
});
</script>
