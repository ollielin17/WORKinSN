<div id="tt"></div>
<script>
function tip(e,t){
  var el=document.getElementById('tt');
  el.textContent=t;
  el.style.display='block';
  el.style.left=(e.clientX+14)+'px';
  el.style.top=(e.clientY-10)+'px';
  clearTimeout(el._h);
  el._h=setTimeout(function(){el.style.display='none'},5000);
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.nd'))document.getElementById('tt').style.display='none';
});
</script>
