<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP SOP 互動流程查詢系統</title>
<style>
/* ====== Design Tokens ====== */
:root {
  --bg: #F0F4F8;
  --surface: #FFFFFF;
  --surface2: #F8FAFC;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --text: #0F172A;
  --text-mid: #475569;
  --text-light: #94A3B8;
  --accent: #1E40AF;
  --accent-light: #DBEAFE;
  --accent-hover: #1D3461;

  /* Module Colors */
  --aap: #2563EB;
  --aap-light: #EFF6FF;
  --agl: #059669;
  --agl-light: #ECFDF5;
  --afa: #7C3AED;
  --afa-light: #F5F3FF;
  --anm: #DC2626;
  --anm-light: #FEF2F2;
  --axr: #D97706;
  --axr-light: #FFFBEB;
  --ais: #0891B2;
  --ais-light: #ECFEFF;

  /* Tag Colors */
  --op-bg: #1E3A5F;
  --op-text: #E0EDFF;
  --batch-bg: #1A4731;
  --batch-text: #CCFFDD;
  --query-bg: #4A1D96;
  --query-text: #EDE9FE;
  --doc-bg: #7C2D12;
  --doc-text: #FEE2E2;

  /* Dept Colors */
  --dept-purch: #1D4ED8;
  --dept-purch-bg: #EFF6FF;
  --dept-fin: #059669;
  --dept-fin-bg: #F0FDF4;
  --dept-acct: #7C3AED;
  --dept-acct-bg: #FAF5FF;
  --dept-other: #6B7280;
  --dept-other-bg: #F9FAFB;

  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
  --transition: .2s cubic-bezier(.4,0,.2,1);
}

/* ====== Reset ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ====== Layout ====== */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ====== Header ====== */
#header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 58px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
#header-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.3px;
  white-space: nowrap;
}
#header-logo span { color: var(--text-mid); font-weight: 400; font-size: 13px; margin-left: 8px; }
#breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-mid);
  flex: 1;
  overflow: hidden;
}
.bc-sep { color: var(--border-strong); }
.bc-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.bc-item.active { color: var(--text); font-weight: 600; }
.bc-item.link { color: var(--accent); cursor: pointer; }
.bc-item.link:hover { text-decoration: underline; }

#back-btn {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  background: var(--accent-light);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: var(--transition);
}
#back-btn:hover { background: #BFDBFE; }
#back-btn.visible { display: flex; }

/* ====== Main ====== */
#main { flex: 1; padding: 28px 28px 60px; max-width: 1280px; margin: 0 auto; width: 100%; }

/* ====== Screen: Module List ====== */
#screen-modules { display: none; }
#screen-modules.active { display: block; }
.screen-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.screen-subtitle { font-size: 14px; color: var(--text-mid); margin-bottom: 24px; }

.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}
.module-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  overflow: hidden;
}
.module-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
}
.module-card[data-mod="AAP"]::before { background: var(--aap); }
.module-card[data-mod="AGL"]::before { background: var(--agl); }
.module-card[data-mod="AFA"]::before { background: var(--afa); }
.module-card[data-mod="ANM"]::before { background: var(--anm); }
.module-card[data-mod="AXR"]::before { background: var(--axr); }
.module-card[data-mod="AIS"]::before { background: var(--ais); }
.module-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); transform: translateY(-2px); }
.module-card-header { display: flex; align-items: center; gap: 12px; }
.module-icon { font-size: 26px; line-height: 1; }
.module-name-wrap { flex: 1; }
.module-name { font-size: 16px; font-weight: 700; color: var(--text); }
.module-name-en { font-size: 11px; color: var(--text-light); font-weight: 500; margin-top: 1px; letter-spacing: .3px; }
.module-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: .5px;
}
.module-card[data-mod="AAP"] .module-badge { background: var(--aap-light); color: var(--aap); }
.module-card[data-mod="AGL"] .module-badge { background: var(--agl-light); color: var(--agl); }
.module-card[data-mod="AFA"] .module-badge { background: var(--afa-light); color: var(--afa); }
.module-card[data-mod="ANM"] .module-badge { background: var(--anm-light); color: var(--anm); }
.module-card[data-mod="AXR"] .module-badge { background: var(--axr-light); color: var(--axr); }
.module-card[data-mod="AIS"] .module-badge { background: var(--ais-light); color: var(--ais); }
.module-desc { font-size: 13px; color: var(--text-mid); line-height: 1.6; }
.module-flow-count { font-size: 12px; color: var(--text-light); padding-top: 4px; border-top: 1px solid var(--border); }
.module-flow-count strong { color: var(--text-mid); }

/* ====== Screen: Flow List ====== */
#screen-flows { display: none; }
#screen-flows.active { display: block; }
.flow-module-header {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.flow-module-icon { font-size: 32px; }
.flow-module-info h2 { font-size: 18px; font-weight: 700; }
.flow-module-info p { font-size: 13px; color: var(--text-mid); margin-top: 3px; }

.dept-filter-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.dept-filter-label { font-size: 12px; color: var(--text-light); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
.dept-filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-mid);
  transition: var(--transition);
  cursor: pointer;
}
.dept-filter-btn.active, .dept-filter-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.flow-list { display: flex; flex-direction: column; gap: 10px; }
.flow-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: var(--transition);
  box-shadow: var(--shadow);
}
.flow-item:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
.flow-number {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text-mid);
  border: 1px solid var(--border);
  white-space: nowrap;
  font-family: monospace;
  letter-spacing: .5px;
}
.flow-info { flex: 1; min-width: 0; }
.flow-name { font-size: 15px; font-weight: 600; color: var(--text); }
.flow-name-en { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.flow-def { font-size: 12px; color: var(--text-mid); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flow-depts { display: flex; gap: 4px; flex-wrap: wrap; }
.flow-dept-tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
}
.flow-arrow { color: var(--text-light); font-size: 18px; }

/* ====== Screen: Flow Steps ====== */
#screen-steps { display: none; }
#screen-steps.active { display: block; }

.flow-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.flow-header-top { display: flex; align-items: flex-start; gap: 14px; }
.flow-header-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  font-family: monospace;
}
.flow-header-title { flex: 1; }
.flow-header-title h2 { font-size: 18px; font-weight: 700; }
.flow-header-title .en { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.flow-header-def { font-size: 13px; color: var(--text-mid); margin-top: 10px; line-height: 1.6; }
.flow-header-meta { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.meta-label { font-size: 11px; color: var(--text-light); font-weight: 600; text-transform: uppercase; }
.dept-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

/* Dept Filter (in step view) */
.step-dept-filter {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--text-light); font-weight: 600; text-transform: uppercase; margin-right: 4px; }
.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-mid);
  transition: var(--transition);
  cursor: pointer;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* ====== Steps Rail ====== */
.steps-container { position: relative; }
.step-card {
  display: flex;
  gap: 16px;
  margin-bottom: 6px;
  position: relative;
}
.step-card.hidden { display: none; }
.step-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 44px;
  flex-shrink: 0;
}
.step-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  border: 2px solid;
  flex-shrink: 0;
  z-index: 1;
}
.step-rail {
  width: 2px;
  flex: 1;
  min-height: 16px;
  margin-top: 4px;
}
.step-card:last-child .step-rail { display: none; }

.step-body {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
}
.step-body.handoff-card {
  border-style: dashed;
  border-color: var(--border-strong);
  background: var(--surface2);
}

.step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.step-dept-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.step-handoff-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  background: #FEF3C7;
  color: #92400E;
  border: 1px solid #FDE68A;
}

.step-action { font-size: 14px; color: var(--text); line-height: 1.65; }
.step-note { font-size: 12px; color: var(--text-mid); margin-top: 8px; background: var(--bg); padding: 8px 10px; border-radius: var(--radius-sm); border-left: 3px solid var(--border-strong); }

/* Handoff Card */
.handoff-card-inner {
  background: var(--surface);
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
}
.handoff-title { font-size: 12px; font-weight: 700; color: #92400E; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.handoff-arrow { font-size: 20px; }
.handoff-docs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.handoff-doc-tag { font-size: 12px; padding: 3px 10px; border-radius: 4px; background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; font-weight: 500; }

/* Tags */
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.code-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 5px;
  font-family: 'Consolas', monospace;
  letter-spacing: .2px;
}
.code-tag .tag-icon { font-size: 10px; }
.code-tag.op { background: var(--op-bg); color: var(--op-text); }
.code-tag.batch { background: var(--batch-bg); color: var(--batch-text); }
.code-tag.query { background: var(--query-bg); color: var(--query-text); }
.code-tag.doc { background: var(--doc-bg); color: var(--doc-text); }

/* Tag legend */
.tag-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-mid); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* Dept Color Mapping */
.dept-採購, .dept-採購部門 { color: var(--dept-purch); background: var(--dept-purch-bg); }
.dept-財務, .dept-財務單位 { color: var(--dept-fin); background: var(--dept-fin-bg); }
.dept-會計, .dept-應付會計, .dept-應收會計, .dept-固資會計, .dept-資金會計, .dept-會計部門, .dept-會計\/財務部門 { color: var(--dept-acct); background: var(--dept-acct-bg); }
.dept-default { color: var(--dept-other); background: var(--dept-other-bg); }

/* Dept step num & rail */
.step-採購 .step-num { color: var(--dept-purch); border-color: var(--dept-purch); background: var(--dept-purch-bg); }
.step-採購 .step-rail { background: var(--dept-purch); opacity: .3; }
.step-財務 .step-num { color: var(--dept-fin); border-color: var(--dept-fin); background: var(--dept-fin-bg); }
.step-財務 .step-rail { background: var(--dept-fin); opacity: .3; }
.step-會計 .step-num, .step-應付會計 .step-num, .step-應收會計 .step-num, .step-固資會計 .step-num, .step-資金會計 .step-num { color: var(--dept-acct); border-color: var(--dept-acct); background: var(--dept-acct-bg); }
.step-會計 .step-rail, .step-應付會計 .step-rail, .step-應收會計 .step-rail, .step-固資會計 .step-rail, .step-資金會計 .step-rail { background: var(--dept-acct); opacity: .3; }
.step-default .step-num { color: var(--dept-other); border-color: var(--border-strong); background: var(--surface2); }
.step-default .step-rail { background: var(--border-strong); }

/* Flow Complete Banner */
.flow-complete {
  background: #F0FDF4;
  border: 1.5px solid #86EFAC;
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}
.complete-icon { font-size: 24px; }
.complete-text { font-size: 14px; font-weight: 600; color: #166534; }
.complete-sub { font-size: 12px; color: #166534; opacity: .8; margin-top: 2px; }

/* ====== Sticky Footer Actions ====== */
.sticky-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--border);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 200;
}
.sticky-footer.hidden { display: none; }
.progress-info { font-size: 13px; color: var(--text-mid); }
.progress-info strong { color: var(--text); }
.footer-actions { display: flex; gap: 10px; }
.btn-home {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-mid);
  transition: var(--transition);
  cursor: pointer;
}
.btn-home:hover { background: var(--bg); }
.btn-primary {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  background: var(--accent);
  color: white;
  transition: var(--transition);
  cursor: pointer;
}
.btn-primary:hover { background: var(--accent-hover); }

/* ====== Scrollbar ====== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="header-logo">ERP SOP <span>互動流程查詢系統</span></div>
    <div id="breadcrumb">
      <span class="bc-item link" id="bc-home" onclick="goHome()">首頁</span>
    </div>
    <button id="back-btn" onclick="goBack()">← 返回</button>
  </div>

  <!-- Main Content -->
  <div id="main">
    <!-- Screen 1: Module List -->
    <div id="screen-modules" class="active">
      <div class="screen-title">ERP 作業流程查詢系統</div>
      <div class="screen-subtitle">選擇模組查看對應的作業流程 SOP 步驟指引</div>
      <div class="module-grid" id="module-grid"></div>
    </div>

    <!-- Screen 2: Flow List -->
    <div id="screen-flows">
      <div class="flow-module-header" id="flow-module-header"></div>
      <div class="dept-filter-bar" id="flow-dept-filter"></div>
      <div class="flow-list" id="flow-list"></div>
    </div>

    <!-- Screen 3: Step View -->
    <div id="screen-steps">
      <div class="flow-header" id="step-flow-header"></div>
      <div class="step-dept-filter" id="step-dept-filter"></div>
      <div class="tag-legend" id="tag-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--op-bg)"></span>作業維護</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--batch-bg)"></span>批次作業</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--query-bg)"></span>查詢作業</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--doc-bg)"></span>單據文件</span>
        <span class="legend-item">🔄 部門交接</span>
      </div>
      <div class="steps-container" id="steps-container"></div>
    </div>
  </div>

  <!-- Sticky Footer (steps screen) -->
  <div class="sticky-footer hidden" id="sticky-footer">
    <div class="progress-info" id="progress-info"></div>
    <div class="footer-actions">
      <button class="btn-home" onclick="goToFlowList()">← 返回流程清單</button>
      <button class="btn-home" onclick="goHome()">🏠 模組首頁</button>
    </div>
  </div>
</div>

<script>
// ====== DATA ======
const SOP_DATA = {
  modules: [
    {
      id: "AAP", name: "應付帳款", nameEn: "Accounts Payable",
      description: "採購預付、發票立帳、暫估應付、倉退折讓、付款核銷及其他應付作業",
      icon: "💳", color: "#2563EB",

// ====== STATE ======
let state = {
  screen: 'modules',
  moduleId: null,
  flowId: null,
  deptFilter: 'all'
};

// ====== HELPERS ======
function getModule(id) { return SOP_DATA.modules.find(m => m.id === id); }
function getFlow(moduleId, flowId) {
  const mod = getModule(moduleId);
  return mod ? mod.flows.find(f => f.id === flowId) : null;
}
function getModuleColor(id) {
  const colors = { AAP:'#2563EB', AGL:'#059669', AFA:'#7C3AED', ANM:'#DC2626', AXR:'#D97706', AIS:'#0891B2' };
  return colors[id] || '#475569';
}
function getDeptClass(dept) {
  if (!dept) return 'dept-default';
  const d = dept.toLowerCase();
  if (d.includes('採購')) return 'dept-採購';
  if (d.includes('財務')) return 'dept-財務';
  if (d.includes('會計') || d.includes('帳務')) return 'dept-會計';
  return 'dept-default';
}
function getStepClass(dept) {
  if (!dept) return 'step-default';
  const d = dept.toLowerCase();
  if (d.includes('採購')) return 'step-採購';
  if (d.includes('財務')) return 'step-財務';
  if (d.includes('會計') || d.includes('帳務') || d.includes('固資') || d.includes('資金') || d.includes('應付') || d.includes('應收')) return 'step-應付會計';
  return 'step-default';
}
function buildCodeTag(item) {
  const icons = { op:'⚙', batch:'⚡', query:'🔍', doc:'📄' };
  const icon = icons[item.type] || '📎';
  return `<span class="code-tag ${item.type}" title="${item.label}"><span class="tag-icon">${icon}</span>${item.code}</span>`;
}

// ====== RENDER MODULE LIST ======
function renderModules() {
  state = { screen:'modules', moduleId:null, flowId:null, deptFilter:'all' };
  document.getElementById('screen-modules').classList.add('active');
  document.getElementById('screen-flows').classList.remove('active');
  document.getElementById('screen-steps').classList.remove('active');
  document.getElementById('sticky-footer').classList.add('hidden');
  document.getElementById('back-btn').classList.remove('visible');
  updateBreadcrumb();

  const grid = document.getElementById('module-grid');
  grid.innerHTML = SOP_DATA.modules.map(mod => `
    <div class="module-card" data-mod="${mod.id}" onclick="selectModule('${mod.id}')">
      <div class="module-card-header">
        <div class="module-icon">${mod.icon}</div>
        <div class="module-name-wrap">
          <div class="module-name">${mod.name}</div>
          <div class="module-name-en">${mod.nameEn}</div>
        </div>
        <div class="module-badge">${mod.id}</div>
      </div>
      <div class="module-desc">${mod.description}</div>
      <div class="module-flow-count"><strong>${mod.flows.length}</strong> 個作業流程</div>
    </div>
  `).join('');
}

// ====== RENDER FLOW LIST ======
function selectModule(moduleId) {
  state.screen = 'flows';
  state.moduleId = moduleId;
  state.flowId = null;
  state.deptFilter = 'all';

  document.getElementById('screen-modules').classList.remove('active');
  document.getElementById('screen-flows').classList.add('active');
  document.getElementById('screen-steps').classList.remove('active');
  document.getElementById('sticky-footer').classList.add('hidden');
  document.getElementById('back-btn').classList.add('visible');
  updateBreadcrumb();

  const mod = getModule(moduleId);
  const color = getModuleColor(moduleId);

  // Module header
  document.getElementById('flow-module-header').innerHTML = `
    <div class="flow-module-icon">${mod.icon}</div>
    <div class="flow-module-info">
      <h2 style="color:${color}">${mod.id} — ${mod.name} <span style="font-size:13px;color:var(--text-light);font-weight:400">(${mod.nameEn})</span></h2>
      <p>${mod.description}</p>
    </div>
  `;

  // Collect all depts
  const allDepts = new Set();
  mod.flows.forEach(f => f.departments.forEach(d => allDepts.add(d)));

  const filterBar = document.getElementById('flow-dept-filter');
  filterBar.innerHTML = `<span class="dept-filter-label">部門篩選</span>
    <button class="dept-filter-btn active" onclick="filterFlows('all',this)">全部</button>
    ${[...allDepts].map(d => `<button class="dept-filter-btn" onclick="filterFlows('${d}',this)">${d}</button>`).join('')}
  `;

  renderFlowList(mod.flows, 'all');
}

function filterFlows(dept, btn) {
  state.deptFilter = dept;
  document.querySelectorAll('#flow-dept-filter .dept-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mod = getModule(state.moduleId);
  renderFlowList(mod.flows, dept);
}

function renderFlowList(flows, deptFilter) {
  const color = getModuleColor(state.moduleId);
  const filtered = deptFilter === 'all' ? flows : flows.filter(f => f.departments.includes(deptFilter));
  document.getElementById('flow-list').innerHTML = filtered.map(flow => {
    const deptTags = flow.departments.map(d =>
      `<span class="flow-dept-tag ${getDeptClass(d)}">${d}</span>`
    ).join('');
    return `
    <div class="flow-item" onclick="selectFlow('${state.moduleId}','${flow.id}')">
      <div class="flow-number" style="color:${color};border-color:${color}20;background:${color}10">${flow.id}</div>
      <div class="flow-info">
        <div class="flow-name">${flow.name}</div>
        <div class="flow-name-en">${flow.nameEn}</div>
        <div class="flow-def">${flow.definition}</div>
      </div>
      <div class="flow-depts">${deptTags}</div>
      <div class="flow-arrow">›</div>
    </div>`;
  }).join('');
}

// ====== RENDER STEP VIEW ======
function selectFlow(moduleId, flowId) {
  state.screen = 'steps';
  state.moduleId = moduleId;
  state.flowId = flowId;
  state.deptFilter = 'all';

  document.getElementById('screen-modules').classList.remove('active');
  document.getElementById('screen-flows').classList.remove('active');
  document.getElementById('screen-steps').classList.add('active');
  document.getElementById('sticky-footer').classList.remove('hidden');
  document.getElementById('back-btn').classList.add('visible');
  updateBreadcrumb();
  renderSteps();
}

function renderSteps() {
  const mod = getModule(state.moduleId);
  const flow = getFlow(state.moduleId, state.flowId);
  const color = getModuleColor(state.moduleId);

  // Flow header
  const deptBadges = flow.departments.map(d =>
    `<span class="dept-badge ${getDeptClass(d)}">${d}</span>`
  ).join('');
  document.getElementById('step-flow-header').innerHTML = `
    <div class="flow-header-top">
      <div class="flow-header-badge" style="background:${color}15;color:${color}">${flow.id}</div>
      <div class="flow-header-title">
        <h2>${flow.name}</h2>
        <div class="en">${flow.nameEn}</div>
      </div>
    </div>
    <div class="flow-header-def">${flow.definition}</div>
    <div class="flow-header-meta">
      <span class="meta-label">涉及部門</span>
      ${deptBadges}
    </div>
  `;

  // Dept filter
  const depts = [...new Set(flow.steps.map(s => s.dept))];
  document.getElementById('step-dept-filter').innerHTML = `
    <span class="filter-label">部門篩選</span>
    <button class="filter-btn active" onclick="filterSteps('all',this)">全部步驟</button>
    ${depts.map(d => `<button class="filter-btn" onclick="filterSteps('${d}',this)">${d}</button>`).join('')}
  `;

  // Steps
  const container = document.getElementById('steps-container');
  container.innerHTML = flow.steps.map((step, idx) => {
    const sc = getStepClass(step.dept);
    const dc = getDeptClass(step.dept);
    const isLast = idx === flow.steps.length - 1;

    let tagsHtml = '';
    const allTags = [...(step.ops || []), ...(step.docs || [])];
    if (allTags.length > 0) {
      tagsHtml = `<div class="tags-row">${allTags.map(buildCodeTag).join('')}</div>`;
    }

    let noteHtml = step.note ? `<div class="step-note">💡 ${step.note}</div>` : '';

    let handoffHtml = '';
    if (step.isHandoff) {
      const docs = (step.handoffDocs || []).map(d => `<span class="handoff-doc-tag">📄 ${d}</span>`).join('');
      handoffHtml = `
        <div class="handoff-card-inner" style="margin-top:8px;">
          <div class="handoff-title">🔄 交接 → <strong>${step.handoffTo}</strong></div>
          <div style="font-size:12px;color:var(--text-mid);margin-bottom:6px;">移交文件：</div>
          <div class="handoff-docs">${docs}</div>
        </div>`;
    }

    return `
    <div class="step-card ${sc}" data-dept="${step.dept}">
      <div class="step-left">
        <div class="step-num">${step.seq}</div>
        ${!isLast ? '<div class="step-rail"></div>' : ''}
      </div>
      <div class="step-body${step.isHandoff ? ' handoff-card' : ''}">
        <div class="step-header">
          <span class="step-dept-badge ${dc}">${step.dept}</span>
          ${step.isHandoff ? '<span class="step-handoff-tag">🔄 部門交接</span>' : ''}
        </div>
        <div class="step-action">${step.action}</div>
        ${tagsHtml}
        ${noteHtml}
        ${handoffHtml}
      </div>
    </div>`;
  }).join('');

  // Completion banner
  container.innerHTML += `
    <div class="flow-complete">
      <div class="complete-icon">✅</div>
      <div>
        <div class="complete-text">流程完成</div>
        <div class="complete-sub">${flow.id} ${flow.name} — 共 ${flow.steps.length} 個步驟</div>
      </div>
    </div>`;

  updateProgressInfo(flow.steps.length, flow.steps.length);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterSteps(dept, btn) {
  state.deptFilter = dept;
  document.querySelectorAll('#step-dept-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const flow = getFlow(state.moduleId, state.flowId);
  const cards = document.querySelectorAll('.step-card');
  let visible = 0;
  cards.forEach(card => {
    if (dept === 'all' || card.dataset.dept === dept) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  updateProgressInfo(visible, flow.steps.length);
}

function updateProgressInfo(shown, total) {
  const flow = getFlow(state.moduleId, state.flowId);
  if (!flow) return;
  document.getElementById('progress-info').innerHTML =
    `<strong>${flow.id} ${flow.name}</strong> &nbsp;·&nbsp; 顯示 <strong>${shown}</strong> / ${total} 個步驟`;
}

// ====== NAV ======
function goBack() {
  if (state.screen === 'steps') {
    document.getElementById('screen-steps').classList.remove('active');
    document.getElementById('screen-flows').classList.add('active');
    document.getElementById('sticky-footer').classList.add('hidden');
    state.screen = 'flows';
    state.flowId = null;
    updateBreadcrumb();
  } else if (state.screen === 'flows') {
    goHome();
  }
  window.scrollTo({ top: 0 });
}

function goHome() {
  renderModules();
  window.scrollTo({ top: 0 });
}

function goToFlowList() {
  goBack();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (state.screen === 'modules') {
    bc.innerHTML = `<span class="bc-item active">模組選擇</span>`;
    document.getElementById('back-btn').classList.remove('visible');
  } else if (state.screen === 'flows') {
    const mod = getModule(state.moduleId);
    bc.innerHTML = `
      <span class="bc-item link" onclick="goHome()">首頁</span>
      <span class="bc-sep">›</span>
      <span class="bc-item active">${mod.id} ${mod.name}</span>`;
  } else if (state.screen === 'steps') {
    const mod = getModule(state.moduleId);
    const flow = getFlow(state.moduleId, state.flowId);
    bc.innerHTML = `
      <span class="bc-item link" onclick="goHome()">首頁</span>
      <span class="bc-sep">›</span>
      <span class="bc-item link" onclick="selectModule('${state.moduleId}')">${mod.id} ${mod.name}</span>
      <span class="bc-sep">›</span>
      <span class="bc-item active">${flow.name}</span>`;
  }
}

// ====== INIT ======
renderModules();
</script>
